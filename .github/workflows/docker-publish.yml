name: Build and Push to Docker Hub

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: clumsysenpai/xcp_slave

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest xcp_fd_slave/tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only push on main branch or version tags, not on PRs
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check secrets are present
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is empty or missing"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is empty or missing"
            exit 1
          fi
          echo "Secrets present — username length=${{ secrets.DOCKERHUB_USERNAME != '' && 'ok' || 'empty' }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            clumsysenpai/xcp_slave:latest
            clumsysenpai/xcp_slave:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
